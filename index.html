<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name "viewport" content="width=device-width,initial-scale=1.0"><title>JD Bank Bill Splitter</title><link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main class="card">
            <h1>JD Bank Bill Splitter</h1>
            <div class="field">
                <label for ="bill"> bill amount ($)</label>
                <input type="number" id="bill" placeholder='0.00' min='0.01'>
            </div>
            <div class="field">
                <label>Tip %</label>
                <div class="tip buttons">
                    <button type ="button" class ="tip-btn" data-tip="10"> 10%</button>
                    <button TYPE ="button" class ="tip-btn"data-tip="15">15%

                    </button>
                    <button type="button"class="tip-btn" data-tip="'18">18%</button>
                    <button type ="button"class="tip-btn" data-tip="20">20%</button>
    
                </div>
            </div>
            <div class="field">
                <label for="people">split between</label>
                <input type="number" id="people" value="1" min="1" step="1">
            </div>
            <div class="results">
                <div class="result-row">
                    <span>"tip-amount"</span>
                    <div class="result-row">
                        <span id ="tip-amount">$0.00</span>

                </div>
                <div class=""result-row>
                    <span>total</span>
                    <span id="total-amount">$0.00</span>
                </div>
                <div class="result-row grand">
                    <span>per person </span>
                    <span id="per-person">$0.00</span>

                </div>
            </div>
        </main>
        <script src="script.js"></script>

    </body>
</html>
